<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MtaaniOS | Sign In</title>
<link rel="icon" type="image/png" href="https://res.cloudinary.com/hztm3zo8/image/upload/v1783966839/Purple_and_Blue_Grdient_Simple_Minimalist_Elegant_Website_Logo_20260713_211434_0000_ndnwtt.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0D0B2B;
    --navy-soft:#141230;
    --cyan:#38B6FF;
    --purple:#9B59B6;
    --text-primary:#F4F5F9;
    --text-muted:#9A9AB5;
    --border:rgba(255,255,255,0.08);
    --danger:#FF6B6B;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--navy);
    font-family:'Inter',sans-serif;
    color:var(--text-primary);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
    padding:24px;
  }
  .glow{
    position:absolute;
    width:600px;
    height:600px;
    border-radius:50%;
    filter:blur(120px);
    opacity:0.25;
    animation:drift 12s ease-in-out infinite alternate;
    pointer-events:none;
  }
  .glow-cyan{background:var(--cyan);top:-200px;left:-150px;}
  .glow-purple{background:var(--purple);bottom:-200px;right:-150px;animation-delay:2s;}
  @keyframes drift{
    from{transform:translate(0,0) scale(1);}
    to{transform:translate(40px,30px) scale(1.08);}
  }
  .card{
    position:relative;
    z-index:2;
    width:100%;
    max-width:400px;
    background:var(--navy-soft);
    border:1px solid var(--border);
    border-radius:20px;
    padding:40px 32px;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
  }
  .logo{
    display:block;
    width:56px;
    height:56px;
    margin:0 auto 20px;
    border-radius:12px;
    object-fit:cover;
  }
  h1{
    font-family:'Poppins',sans-serif;
    font-weight:600;
    font-size:22px;
    text-align:center;
    margin-bottom:4px;
    letter-spacing:-0.02em;
  }
  .subtitle{
    text-align:center;
    color:var(--text-muted);
    font-size:13px;
    margin-bottom:32px;
  }
  .field{margin-bottom:16px;}
  label{
    display:block;
    font-size:12px;
    font-weight:500;
    color:var(--text-muted);
    margin-bottom:6px;
  }
  input{
    width:100%;
    padding:12px 14px;
    background:rgba(255,255,255,0.03);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text-primary);
    font-size:14px;
    font-family:'Inter',sans-serif;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  input:focus{
    outline:none;
    border-color:var(--cyan);
    box-shadow:0 0 0 3px rgba(56,182,255,0.15);
  }
  .row-between{
    display:flex;
    justify-content:flex-end;
    margin-bottom:24px;
  }
  .link-btn{
    background:none;
    border:none;
    color:var(--cyan);
    font-size:12px;
    font-weight:500;
    cursor:pointer;
    padding:0;
  }
  .link-btn:hover{text-decoration:underline;}
  button.submit{
    width:100%;
    padding:13px;
    background:linear-gradient(135deg, var(--cyan), var(--purple));
    border:none;
    border-radius:10px;
    color:#fff;
    font-family:'Poppins',sans-serif;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    transition:opacity 0.2s, transform 0.1s;
  }
  button.submit:hover{opacity:0.92;}
  button.submit:active{transform:scale(0.98);}
  button.submit:disabled{opacity:0.5;cursor:not-allowed;}
  .message{
    margin-top:16px;
    padding:10px 12px;
    border-radius:8px;
    font-size:12px;
    text-align:center;
    display:none;
  }
  .message.error{
    display:block;
    background:rgba(255,107,107,0.1);
    color:var(--danger);
    border:1px solid rgba(255,107,107,0.2);
  }
  .message.success{
    display:block;
    background:rgba(56,182,255,0.1);
    color:var(--cyan);
    border:1px solid rgba(56,182,255,0.2);
  }
  .footer-note{
    text-align:center;
    margin-top:24px;
    font-size:11px;
    color:var(--text-muted);
  }
  .spinner{
    display:inline-block;
    width:14px;
    height:14px;
    border:2px solid rgba(255,255,255,0.4);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin 0.7s linear infinite;
    vertical-align:middle;
    margin-right:6px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="glow glow-cyan"></div>
<div class="glow glow-purple"></div>

<div class="card">
  <img class="logo" src="https://res.cloudinary.com/hztm3zo8/image/upload/v1783966839/Purple_and_Blue_Grdient_Simple_Minimalist_Elegant_Website_Logo_20260713_211434_0000_ndnwtt.png" alt="MtaaniOS">
  <h1>MtaaniOS</h1>
  <p class="subtitle">Small Business Operating System</p>

  <form id="loginForm">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <div class="row-between">
      <button type="button" class="link-btn" id="forgotBtn">Forgot password?</button>
    </div>
    <button type="submit" class="submit" id="submitBtn">Sign in</button>
    <div class="message" id="message"></div>
  </form>

  <p class="footer-note">MtaaniOS runs on MtaaniWeb</p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    sendPasswordResetEmail,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-ndNW__8PMGJB3QHnFD9J7XtQh82EqjA",
    authDomain: "mtaanios.firebaseapp.com",
    projectId: "mtaanios",
    storageBucket: "mtaanios.firebasestorage.app",
    messagingSenderId: "407302134340",
    appId: "1:407302134340:web:697218f5731b0314a23a11"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const ADMIN_EMAIL = "mtaaniweb@gmail.com";

  const form = document.getElementById("loginForm");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const submitBtn = document.getElementById("submitBtn");
  const forgotBtn = document.getElementById("forgotBtn");
  const messageEl = document.getElementById("message");

  function showMessage(text, type){
    messageEl.textContent = text;
    messageEl.className = "message " + type;
  }

  function routeUser(email){
    if(email && email.toLowerCase() === ADMIN_EMAIL){
      window.location.href = "admin.html";
    } else {
      window.location.href = "teamdash.html";
    }
  }

  // If already signed in, skip the form
  onAuthStateChanged(auth, (user) => {
    if(user){
      routeUser(user.email);
    }
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    messageEl.className = "message";
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span>Signing in';

    const email = emailInput.value.trim();
    const password = passwordInput.value;

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      showMessage("Signed in. Redirecting...", "success");
      routeUser(cred.user.email);
    } catch (err) {
      let text = "Something went wrong. Try again.";
      if(err.code === "auth/invalid-credential" || err.code === "auth/wrong-password" || err.code === "auth/user-not-found"){
        text = "Incorrect email or password.";
      } else if(err.code === "auth/too-many-requests"){
        text = "Too many attempts. Try again shortly.";
      } else if(err.code === "auth/invalid-email"){
        text = "Enter a valid email address.";
      }
      showMessage(text, "error");
      submitBtn.disabled = false;
      submitBtn.textContent = "Sign in";
    }
  });

  forgotBtn.addEventListener("click", async () => {
    const email = emailInput.value.trim();
    if(!email){
      showMessage("Enter your email above first, then tap Forgot password.", "error");
      return;
    }
    try {
      await sendPasswordResetEmail(auth, email);
      showMessage("Reset link sent. Check your inbox.", "success");
    } catch (err) {
      showMessage("Could not send reset link. Check the email entered.", "error");
    }
  });
</script>

</body>
</html>
