<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MtaaniOS | Bookings</title>
<link rel="icon" type="image/png" href="https://res.cloudinary.com/hztm3zo8/image/upload/v1783966839/Purple_and_Blue_Grdient_Simple_Minimalist_Elegant_Website_Logo_20260713_211434_0000_ndnwtt.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0D0B2B;--navy-soft:#141230;--navy-card:#181633;
    --cyan:#38B6FF;--purple:#9B59B6;--text-primary:#F4F5F9;--text-muted:#9A9AB5;
    --border:rgba(255,255,255,0.08);--danger:#FF6B6B;--success:#4ADE80;--warn:#FFC107;
    --sidebar-w:240px;
  }
  [data-theme="light"]{
    --navy:#F4F5F9;--navy-soft:#FFFFFF;--navy-card:#FFFFFF;
    --text-primary:#171630;--text-muted:#6B6B85;--border:rgba(13,11,43,0.1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--navy);font-family:'Inter',sans-serif;color:var(--text-primary);min-height:100vh;display:flex;transition:background 0.3s, color 0.3s;}
  .sidebar{width:var(--sidebar-w);background:var(--navy-soft);border-right:1px solid var(--border);height:100vh;position:fixed;top:0;left:0;display:flex;flex-direction:column;padding:24px 16px;z-index:100;transition:transform 0.3s;}
  .brand{display:flex;align-items:center;gap:10px;padding:0 8px 24px;margin-bottom:8px;border-bottom:1px solid var(--border);}
  .brand img{width:32px;height:32px;border-radius:8px;}
  .brand span{font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;}
  nav{flex:1;display:flex;flex-direction:column;gap:2px;margin-top:16px;overflow-y:auto;}
  nav a{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:500;transition:background 0.15s, color 0.15s;}
  nav a svg{width:16px;height:16px;flex-shrink:0;}
  nav a:hover{background:rgba(56,182,255,0.08);color:var(--text-primary);}
  nav a.active{background:linear-gradient(135deg, rgba(56,182,255,0.15), rgba(155,89,182,0.15));color:var(--cyan);}
  .sidebar-footer{border-top:1px solid var(--border);padding-top:16px;margin-top:8px;position:relative;}
  .signout-btn{width:100%;padding:10px 12px;background:none;border:1px solid var(--border);border-radius:10px;color:var(--danger);font-size:13px;font-weight:500;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;}
  .signout-btn:hover{background:rgba(255,107,107,0.08);}

  .main{margin-left:var(--sidebar-w);flex:1;padding:32px 40px 60px;max-width:1100px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:16px;}
  .topbar h1{font-family:'Poppins',sans-serif;font-weight:600;font-size:24px;}
  .topbar p{color:var(--text-muted);font-size:13px;margin-top:2px;}

  .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:10px;border:none;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer;}
  .btn-primary{background:linear-gradient(135deg, var(--cyan), var(--purple));color:#fff;}
  .btn-primary:hover{opacity:0.92;}
  .btn-ghost{background:none;border:1px solid var(--border);color:var(--text-primary);}
  .btn-ghost:hover{background:rgba(255,255,255,0.04);}
  .btn-danger{background:rgba(255,107,107,0.1);color:var(--danger);border:1px solid rgba(255,107,107,0.2);}
  .btn-success{background:rgba(74,222,128,0.12);color:var(--success);border:1px solid rgba(74,222,128,0.25);}
  .btn-sm{padding:6px 11px;font-size:11px;}

  .today-panel{background:var(--navy-card);border:1px solid var(--border);border-radius:16px;padding:18px 20px;margin-bottom:20px;}
  .today-panel h2{font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;margin-bottom:10px;}
  .today-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .today-item:last-child{border-bottom:none;}

  .status-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:20px;padding-bottom:4px;}
  .status-tab{flex-shrink:0;padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--navy-card);color:var(--text-muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;}
  .status-tab.active{background:linear-gradient(135deg, rgba(56,182,255,0.18), rgba(155,89,182,0.18));color:var(--cyan);border-color:transparent;}

  .search-row{display:flex;gap:10px;margin-bottom:20px;}
  .search-row input{flex:1;padding:11px 14px;background:var(--navy-card);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-size:13px;}
  .search-row input:focus{outline:none;border-color:var(--cyan);}

  .booking-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .booking-card{background:var(--navy-card);border:1px solid var(--border);border-radius:16px;padding:18px;position:relative;overflow:hidden;}
  .booking-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px;}
  .booking-name{font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;cursor:pointer;}
  .booking-service{font-size:12px;color:var(--text-muted);margin-bottom:10px;}
  .booking-meta{font-size:11px;color:var(--text-muted);display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
  .status-badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:0.02em;white-space:nowrap;}
  .status-badge.pending{background:rgba(255,193,7,0.15);color:var(--warn);}
  .status-badge.approved{background:rgba(56,182,255,0.15);color:var(--cyan);}
  .status-badge.completed{background:rgba(74,222,128,0.15);color:var(--success);}
  .status-badge.declined{background:rgba(255,107,107,0.15);color:var(--danger);}
  .booking-actions{display:flex;gap:6px;flex-wrap:wrap;}
  .reminder-tag{font-size:10px;color:var(--success);display:flex;align-items:center;gap:4px;margin-top:2px;}
  .reminder-tag.pending-reminder{color:var(--text-muted);}

  .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
  .empty-state svg{width:40px;height:40px;margin-bottom:14px;opacity:0.4;}
  .empty-state p{font-size:13px;}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--navy-soft);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;}
  .modal h2{font-family:'Poppins',sans-serif;font-size:17px;font-weight:600;margin-bottom:18px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:500;color:var(--text-muted);margin-bottom:6px;}
  .field input, .field textarea, .field select{width:100%;padding:11px 13px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:9px;color:var(--text-primary);font-size:13px;font-family:'Inter',sans-serif;resize:vertical;}
  .field input:focus, .field textarea:focus, .field select:focus{outline:none;border-color:var(--cyan);}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}
  .checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .checkbox-row input{width:auto;}
  .checkbox-row label{margin:0;font-size:13px;color:var(--text-primary);}
  .modal-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
  .modal-actions .btn{flex:1;justify-content:center;min-width:100px;}

  .loading-row{display:flex;align-items:center;gap:8px;color:var(--text-muted);font-size:12px;padding:16px 0;}
  .spin{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .mobile-toggle{display:none;position:fixed;top:16px;left:16px;z-index:200;background:var(--navy-card);border:1px solid var(--border);border-radius:10px;width:40px;height:40px;align-items:center;justify-content:center;cursor:pointer;}
  @media(max-width:860px){
    .sidebar{transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .main{margin-left:0;padding:32px 20px 60px;}
    .mobile-toggle{display:flex;}
    .topbar{margin-top:36px;}
  }

  /* DESKTOP: cards expand beyond the fixed 2-column mobile layout */
  @media(min-width:900px){
  .booking-grid{grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));}
  }

  .alert-bell{
    width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;
    background:none;border:1px solid var(--border);border-radius:10px;
    color:var(--text-muted);font-size:13px;font-weight:500;cursor:pointer;
    font-family:'Inter',sans-serif;margin-bottom:8px;text-decoration:none;
  }
  .alert-bell:hover{background:rgba(56,182,255,0.08);color:var(--text-primary);}
  .alert-bell svg{width:16px;height:16px;flex-shrink:0;}
  .alert-badge{
    margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;
    padding:2px 7px;border-radius:20px;line-height:1.4;
  }
  nav a[href="payments.html"], nav a[href="reports.html"]{display:none;}

  @media(max-width:400px){
    .booking-card{padding:14px;}
    .booking-name{font-size:14px;word-break:break-word;}
  }
</style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import {
    getFirestore, collection, getDocs, doc, addDoc, updateDoc, deleteDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-ndNW__8PMGJB3QHnFD9J7XtQh82EqjA",
    authDomain: "mtaanios.firebaseapp.com",
    projectId: "mtaanios",
    storageBucket: "mtaanios.firebasestorage.app",
    messagingSenderId: "407302134340",
    appId: "1:407302134340:web:697218f5731b0314a23a11"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const ADMIN_EMAIL = "mtaaniweb@gmail.com";

  let currentUser = null;
  let allBookings = [];
  let activeStatus = "all";
  let editingBookingId = null;


  function applySidebarRestrictions(user){
    const isAdmin = user.email.toLowerCase() === ADMIN_EMAIL;
    document.getElementById("navDashboard").href = isAdmin ? "admin.html" : "teamdash.html";
    if(isAdmin){
      document.querySelectorAll('nav a[href="payments.html"], nav a[href="reports.html"]').forEach(a => a.style.display = "flex");
    }
  }

  onAuthStateChanged(auth, (user) => {
    if(!user){ window.location.href = "login.html"; return; }
    currentUser = user;
    applySidebarRestrictions(user);
    initAlertBell(user, user.email.toLowerCase() === ADMIN_EMAIL);
    loadBookings();
  });

  document.getElementById("signoutBtn").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "login.html";
  });

  const sidebar = document.getElementById("sidebar");
  document.getElementById("mobileToggle").addEventListener("click", () => sidebar.classList.toggle("open"));

  const savedTheme = localStorage.getItem("mtaanios-theme") || "dark";
  document.body.setAttribute("data-theme", savedTheme);

  async function logActivity(description){
    try{
      await addDoc(collection(db, "activity"), {
        description, actor: currentUser ? currentUser.email : "System", timestamp: serverTimestamp()
      });
    } catch(err){ console.warn("Could not log activity", err.message); }
  }

  function statusClass(status){
    return (status || "Pending").toLowerCase();
  }

  async function loadBookings(){
    try{
      const snap = await getDocs(collection(db, "bookings"));
      allBookings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderUpcoming();
      applyFilters();
    } catch(err){
      console.warn("Could not load bookings", err.message);
      allBookings = [];
      applyFilters();
    }
  }

  function renderUpcoming(){
    const el = document.getElementById("upcomingList");
    const todayStr = new Date().toISOString().split("T")[0];
    const upcoming = allBookings
      .filter(b => b.date && b.date >= todayStr && b.status !== "Declined" && b.status !== "Completed")
      .sort((a,b) => (a.date + (a.time||"")).localeCompare(b.date + (b.time||"")))
      .slice(0, 6);

    if(upcoming.length === 0){
      el.innerHTML = `<p style="font-size:12px;color:var(--text-muted);">Nothing coming up.</p>`;
      return;
    }
    el.innerHTML = upcoming.map(b => `
      <div class="today-item">
        <span>${b.name || "Unnamed"} &middot; ${b.service || "-"} &middot; ${b.date}${b.time ? " " + b.time : ""}</span>
        <span class="status-badge ${statusClass(b.status)}">${b.status || "Pending"}</span>
      </div>
    `).join("");
  }

  document.querySelectorAll(".status-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".status-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      activeStatus = tab.dataset.status;
      applyFilters();
    });
  });

  document.getElementById("searchInput").addEventListener("input", applyFilters);

  function applyFilters(){
    const term = document.getElementById("searchInput").value.toLowerCase();
    let filtered = allBookings;
    if(activeStatus !== "all") filtered = filtered.filter(b => b.status === activeStatus);
    if(term) filtered = filtered.filter(b => (b.name || "").toLowerCase().includes(term) || (b.service || "").toLowerCase().includes(term));
    filtered = [...filtered].sort((a,b) => (a.date||"").localeCompare(b.date||""));
    renderBookings(filtered);
  }

  function renderBookings(list){
    const wrap = document.getElementById("bookingGridWrap");
    document.getElementById("bookingCount").textContent = allBookings.length === 0 ? "No bookings yet" : allBookings.length + (allBookings.length === 1 ? " booking total" : " bookings total");

    if(list.length === 0){
      wrap.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <p>No bookings here yet.</p>
      </div>`;
      return;
    }

    wrap.innerHTML = `<div class="booking-grid">` + list.map(b => `
      <div class="booking-card" data-id="${b.id}">
        <div class="booking-top">
          <div class="booking-name" data-open="${b.id}">${b.name || "Unnamed"}</div>
          <span class="status-badge ${statusClass(b.status)}">${b.status || "Pending"}</span>
        </div>
        <div class="booking-service">${b.service || "No service specified"}</div>
        <div class="booking-meta">
          <span>${b.date || "No date"} ${b.time || ""}</span>
          <span>${b.phone || "No phone"}</span>
          <span class="reminder-tag ${b.reminderSent ? "" : "pending-reminder"}">${b.reminderSent ? "Reminder sent" : "Reminder not sent"}</span>
        </div>
        <div class="booking-actions">
          ${b.status === "Pending" ? `<button class="btn btn-success btn-sm" data-approve="${b.id}">Approve</button><button class="btn btn-danger btn-sm" data-decline="${b.id}">Decline</button>` : ""}
          ${b.status === "Approved" ? `<button class="btn btn-success btn-sm" data-complete="${b.id}">Mark completed</button>` : ""}
          <button class="btn btn-ghost btn-sm" data-edit="${b.id}">Edit</button>
        </div>
      </div>
    `).join("") + `</div>`;

    wrap.querySelectorAll("[data-open], [data-edit]").forEach(el => {
      el.addEventListener("click", () => openEditModal(el.dataset.open || el.dataset.edit));
    });
    wrap.querySelectorAll("[data-approve]").forEach(el => {
      el.addEventListener("click", () => quickStatusChange(el.dataset.approve, "Approved"));
    });
    wrap.querySelectorAll("[data-decline]").forEach(el => {
      el.addEventListener("click", () => quickStatusChange(el.dataset.decline, "Declined"));
    });
    wrap.querySelectorAll("[data-complete]").forEach(el => {
      el.addEventListener("click", () => quickStatusChange(el.dataset.complete, "Completed"));
    });
  }

  async function quickStatusChange(id, newStatus){
    try{
      await updateDoc(doc(db, "bookings", id), { status: newStatus });
      const b = allBookings.find(x => x.id === id);
      await logActivity(`Booking ${newStatus.toLowerCase()}: ${b?.name || ""}`);
      await loadBookings();
    } catch(err){
      alert("Could not update booking status.");
    }
  }

  const modalOverlay = document.getElementById("modalOverlay");
  document.getElementById("addBookingBtn").addEventListener("click", () => openModal());
  document.getElementById("cancelModalBtn").addEventListener("click", () => modalOverlay.classList.remove("open"));

  function openModal(booking){
    editingBookingId = booking ? booking.id : null;
    document.getElementById("modalTitle").textContent = booking ? "Edit booking" : "Add booking";
    document.getElementById("fName").value = booking?.name || "";
    document.getElementById("fPhone").value = booking?.phone || "";
    document.getElementById("fService").value = booking?.service || "";
    document.getElementById("fDate").value = booking?.date || "";
    document.getElementById("fTime").value = booking?.time || "";
    document.getElementById("fStatus").value = booking?.status || "Pending";
    document.getElementById("fReminder").checked = !!booking?.reminderSent;
    document.getElementById("fNotes").value = booking?.notes || "";
    document.getElementById("deleteBookingBtn").style.display = booking ? "block" : "none";
    modalOverlay.classList.add("open");
  }

  function openEditModal(id){
    const booking = allBookings.find(b => b.id === id);
    if(booking) openModal(booking);
  }

  document.getElementById("saveBookingBtn").addEventListener("click", async () => {
    const name = document.getElementById("fName").value.trim();
    if(!name){ alert("Customer name is required."); return; }

    const data = {
      name,
      phone: document.getElementById("fPhone").value.trim(),
      service: document.getElementById("fService").value.trim(),
      date: document.getElementById("fDate").value,
      time: document.getElementById("fTime").value,
      status: document.getElementById("fStatus").value,
      reminderSent: document.getElementById("fReminder").checked,
      notes: document.getElementById("fNotes").value.trim()
    };

    try{
      if(editingBookingId){
        await updateDoc(doc(db, "bookings", editingBookingId), data);
        await logActivity(`Booking updated: ${name}`);
      } else {
        await addDoc(collection(db, "bookings"), { ...data, createdAt: serverTimestamp() });
        await logActivity(`New booking request: ${name} for ${data.service || "a service"}`);
      }
      modalOverlay.classList.remove("open");
      await loadBookings();
    } catch(err){
      alert("Could not save booking. Check your connection and try again.");
      console.error(err);
    }
  });

  document.getElementById("deleteBookingBtn").addEventListener("click", async () => {
    if(!editingBookingId) return;
    const b = allBookings.find(x => x.id === editingBookingId);
    if(!confirm(`Delete this booking for ${b?.name || "this customer"}?`)) return;
    try{
      await deleteDoc(doc(db, "bookings", editingBookingId));
      await logActivity(`Deleted booking: ${b?.name || ""}`);
      modalOverlay.classList.remove("open");
      await loadBookings();
    } catch(err){
      alert("Could not delete booking.");
    }
  });

  // ===== ALERT BELL =====
  async function initAlertBell(user, isAdminUser){
    let myName = null;
    if(!isAdminUser){
      try{
        const teamSnap = await getDocs(collection(db, "team"));
        const teamList = teamSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        const profile = teamList.find(m => (m.email || "").toLowerCase() === user.email.toLowerCase());
        myName = profile ? profile.name : null;
      } catch(err){ myName = null; }
    }

    const todayStr = new Date().toISOString().split("T")[0];
    let count = 0;

    try{
      const taskSnap = await getDocs(collection(db, "tasks"));
      const tasks = taskSnap.docs.map(d => d.data());
      count += tasks.filter(t => t.dueDate && t.dueDate < todayStr && t.status !== "Done" && (isAdminUser || t.assignedTo === myName)).length;
    } catch(err){}

    try{
      const leadSnap = await getDocs(collection(db, "leads"));
      const leads = leadSnap.docs.map(d => d.data());
      count += leads.filter(l => l.followUpDate && l.followUpDate <= todayStr && l.stage !== "Won" && l.stage !== "Lost" && (isAdminUser || l.assignedTo === myName)).length;
    } catch(err){}

    if(isAdminUser){
      try{
        const paySnap = await getDocs(collection(db, "payments"));
        const payments = paySnap.docs.map(d => d.data());
        count += payments.filter(p => Number(p.amountExpected || 0) > Number(p.amountReceived || 0)).length;
      } catch(err){}
    }

    const badge = document.getElementById("alertBadge");
    if(count === 0){
      badge.style.display = "none";
    } else {
      badge.style.display = "inline-block";
      badge.textContent = count;
    }
  }



</script>
