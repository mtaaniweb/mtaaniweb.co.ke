<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MtaaniOS | Clients</title>
<link rel="icon" type="image/png" href="https://res.cloudinary.com/hztm3zo8/image/upload/v1783966839/Purple_and_Blue_Grdient_Simple_Minimalist_Elegant_Website_Logo_20260713_211434_0000_ndnwtt.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0D0B2B;
    --navy-soft:#141230;
    --navy-card:#181633;
    --cyan:#38B6FF;
    --purple:#9B59B6;
    --text-primary:#F4F5F9;
    --text-muted:#9A9AB5;
    --border:rgba(255,255,255,0.08);
    --danger:#FF6B6B;
    --success:#4ADE80;
    --sidebar-w:240px;
  }
  [data-theme="light"]{
    --navy:#F4F5F9;
    --navy-soft:#FFFFFF;
    --navy-card:#FFFFFF;
    --text-primary:#171630;
    --text-muted:#6B6B85;
    --border:rgba(13,11,43,0.1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--navy);
    font-family:'Inter',sans-serif;
    color:var(--text-primary);
    min-height:100vh;
    display:flex;
    transition:background 0.3s, color 0.3s;
  }
  .sidebar{
    width:var(--sidebar-w);
    background:var(--navy-soft);
    border-right:1px solid var(--border);
    height:100vh;
    position:fixed;
    top:0;left:0;
    display:flex;
    flex-direction:column;
    padding:24px 16px;
    z-index:100;
    transition:transform 0.3s;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:0 8px 24px;margin-bottom:8px;border-bottom:1px solid var(--border);}
  .brand img{width:32px;height:32px;border-radius:8px;}
  .brand span{font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;}
  nav{flex:1;display:flex;flex-direction:column;gap:2px;margin-top:16px;overflow-y:auto;}
  nav a{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:500;transition:background 0.15s, color 0.15s;}
  nav a svg{width:16px;height:16px;flex-shrink:0;}
  nav a:hover{background:rgba(56,182,255,0.08);color:var(--text-primary);}
  nav a.active{background:linear-gradient(135deg, rgba(56,182,255,0.15), rgba(155,89,182,0.15));color:var(--cyan);}
  .sidebar-footer{border-top:1px solid var(--border);padding-top:16px;margin-top:8px;}
  .signout-btn{width:100%;padding:10px 12px;background:none;border:1px solid var(--border);border-radius:10px;color:var(--danger);font-size:13px;font-weight:500;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;}
  .signout-btn:hover{background:rgba(255,107,107,0.08);}

  .main{margin-left:var(--sidebar-w);flex:1;padding:32px 40px 60px;max-width:1100px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:16px;}
  .topbar h1{font-family:'Poppins',sans-serif;font-weight:600;font-size:24px;}
  .topbar p{color:var(--text-muted);font-size:13px;margin-top:2px;}

  .btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:10px 16px;border-radius:10px;border:none;
    font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer;
  }
  .btn-primary{background:linear-gradient(135deg, var(--cyan), var(--purple));color:#fff;}
  .btn-primary:hover{opacity:0.92;}
  .btn-ghost{background:none;border:1px solid var(--border);color:var(--text-primary);}
  .btn-ghost:hover{background:rgba(255,255,255,0.04);}
  .btn-danger{background:rgba(255,107,107,0.1);color:var(--danger);border:1px solid rgba(255,107,107,0.2);}

  .search-row{display:flex;gap:10px;margin-bottom:20px;}
  .search-row input{
    flex:1;padding:11px 14px;background:var(--navy-card);
    border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-size:13px;
  }
  .search-row input:focus{outline:none;border-color:var(--cyan);}

  .client-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));gap:14px;}
  .client-card{
    background:var(--navy-card);border:1px solid var(--border);border-radius:16px;
    padding:18px;cursor:pointer;transition:transform 0.15s, box-shadow 0.15s;position:relative;overflow:hidden;
  }
  .client-card:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(56,182,255,0.1);}
  .client-card::before{content:'';position:absolute;top:-30%;right:-30%;width:100px;height:100px;background:radial-gradient(circle, var(--cyan) 0%, transparent 70%);opacity:0.15;filter:blur(20px);}
  .client-name{font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;margin-bottom:2px;}
  .client-business{font-size:12px;color:var(--text-muted);margin-bottom:10px;}
  .client-meta{font-size:12px;color:var(--text-muted);display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
  .tag-row{display:flex;flex-wrap:wrap;gap:6px;}
  .tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;background:rgba(56,182,255,0.12);color:var(--cyan);text-transform:uppercase;letter-spacing:0.02em;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
  .empty-state svg{width:40px;height:40px;margin-bottom:14px;opacity:0.4;}
  .empty-state p{font-size:13px;margin-bottom:16px;}

  /* MODAL */
  .modal-overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);
    z-index:300;align-items:center;justify-content:center;padding:20px;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--navy-soft);border:1px solid var(--border);border-radius:18px;
    padding:28px;width:100%;max-width:440px;max-height:88vh;overflow-y:auto;
  }
  .modal h2{font-family:'Poppins',sans-serif;font-size:17px;font-weight:600;margin-bottom:18px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:500;color:var(--text-muted);margin-bottom:6px;}
  .field input, .field textarea{
    width:100%;padding:11px 13px;background:rgba(255,255,255,0.03);
    border:1px solid var(--border);border-radius:9px;color:var(--text-primary);
    font-size:13px;font-family:'Inter',sans-serif;resize:vertical;
  }
  .field input:focus, .field textarea:focus{outline:none;border-color:var(--cyan);}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .modal-actions .btn{flex:1;justify-content:center;}

  /* DETAIL VIEW */
  .detail-view{display:none;}
  .detail-view.open{display:block;}
  .list-view.hidden{display:none;}
  .back-btn{
    display:inline-flex;align-items:center;gap:6px;background:none;border:none;
    color:var(--text-muted);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:20px;
  }
  .back-btn:hover{color:var(--text-primary);}
  .detail-header{
    display:flex;justify-content:space-between;align-items:flex-start;
    background:var(--navy-card);border:1px solid var(--border);border-radius:16px;
    padding:24px;margin-bottom:20px;flex-wrap:wrap;gap:16px;
  }
  .detail-name{font-family:'Poppins',sans-serif;font-size:20px;font-weight:600;margin-bottom:4px;}
  .detail-business{color:var(--text-muted);font-size:13px;margin-bottom:12px;}
  .detail-contact{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text-muted);}
  .detail-actions{display:flex;gap:8px;}

  .tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);}
  .tab-btn{
    background:none;border:none;padding:10px 16px;font-size:13px;font-weight:500;
    color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;
    font-family:'Inter',sans-serif;
  }
  .tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  .panel{background:var(--navy-card);border:1px solid var(--border);border-radius:16px;padding:22px;}
  .notes-text{font-size:13px;line-height:1.6;color:var(--text-primary);white-space:pre-wrap;}

  .history-form{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .history-form select, .history-form input{
    padding:9px 11px;background:rgba(255,255,255,0.03);border:1px solid var(--border);
    border-radius:8px;color:var(--text-primary);font-size:12px;font-family:'Inter',sans-serif;
  }
  .history-form input[type="text"]{flex:1;min-width:150px;}

  .history-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
  .history-item:last-child{border-bottom:none;}
  .history-icon{
    width:30px;height:30px;border-radius:50%;background:rgba(56,182,255,0.12);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .history-icon svg{width:14px;height:14px;color:var(--cyan);}
  .history-body{flex:1;}
  .history-note{font-size:13px;margin-bottom:2px;}
  .history-meta{font-size:11px;color:var(--text-muted);}

  .loading-row{display:flex;align-items:center;gap:8px;color:var(--text-muted);font-size:12px;padding:16px 0;}
  .spin{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .mobile-toggle{
    display:none;position:fixed;top:16px;left:16px;z-index:200;
    background:var(--navy-card);border:1px solid var(--border);border-radius:10px;
    width:40px;height:40px;align-items:center;justify-content:center;cursor:pointer;
  }
  @media(max-width:860px){
    .sidebar{transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .main{margin-left:0;padding:32px 20px 60px;}
    .mobile-toggle{display:flex;}
    .topbar{margin-top:36px;}
  }
</style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import {
    getFirestore, collection, getDocs, doc, addDoc, updateDoc, deleteDoc,
    query, where, orderBy, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-ndNW__8PMGJB3QHnFD9J7XtQh82EqjA",
    authDomain: "mtaanios.firebaseapp.com",
    projectId: "mtaanios",
    storageBucket: "mtaanios.firebasestorage.app",
    messagingSenderId: "407302134340",
    appId: "1:407302134340:web:697218f5731b0314a23a11"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const ADMIN_EMAIL = "mtaaniweb@gmail.com";

  let currentUser = null;
  let allClients = [];
  let activeClientId = null;
  let editingClientId = null;

  onAuthStateChanged(auth, (user) => {
    if(!user){
      window.location.href = "login.html";
      return;
    }
    currentUser = user;
    loadClients();
  });

  document.getElementById("signoutBtn").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "login.html";
  });

  const sidebar = document.getElementById("sidebar");
  document.getElementById("mobileToggle").addEventListener("click", () => sidebar.classList.toggle("open"));

  const savedTheme = localStorage.getItem("mtaanios-theme") || "dark";
  document.body.setAttribute("data-theme", savedTheme);

  function fmtKES(n){ return "KES " + Number(n || 0).toLocaleString("en-KE"); }

  async function logActivity(description){
    try{
      await addDoc(collection(db, "activity"), {
        description,
        actor: currentUser ? currentUser.email : "System",
        timestamp: serverTimestamp()
      });
    } catch(err){ console.warn("Could not log activity", err.message); }
  }

  // LOAD + RENDER CLIENT LIST
  async function loadClients(){
    try{
      const snap = await getDocs(collection(db, "clients"));
      allClients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderClientList(allClients);
    } catch(err){
      console.warn("Could not load clients", err.message);
      renderClientList([]);
    }
  }

  function renderClientList(list){
    const wrap = document.getElementById("clientGridWrap");
    const countEl = document.getElementById("clientCount");
    countEl.textContent = list.length === 0 ? "No clients yet" : list.length + (list.length === 1 ? " client" : " clients");

    if(list.length === 0){
      wrap.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a8 8 0 0116 0v1"/></svg>
        <p>No clients yet. Every business relationship starts here.</p>
      </div>`;
      return;
    }

    wrap.innerHTML = `<div class="client-grid">` + list.map(c => {
      const tags = (c.tags || []).slice(0,3).map(t => `<span class="tag">${t}</span>`).join("");
      return `<div class="client-card" data-id="${c.id}">
        <div class="client-name">${c.name || "Unnamed client"}</div>
        <div class="client-business">${c.business || "No business listed"}</div>
        <div class="client-meta">
          <span>${c.phone || "No phone"}</span>
          <span>${c.email || "No email"}</span>
        </div>
        <div class="tag-row">${tags}</div>
      </div>`;
    }).join("") + `</div>`;

    document.querySelectorAll(".client-card").forEach(card => {
      card.addEventListener("click", () => openClientDetail(card.dataset.id));
    });
  }

  document.getElementById("searchInput").addEventListener("input", (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = allClients.filter(c =>
      (c.name || "").toLowerCase().includes(term) ||
      (c.business || "").toLowerCase().includes(term) ||
      (c.tags || []).some(t => t.toLowerCase().includes(term))
    );
    renderClientList(filtered);
  });

  // MODAL: ADD / EDIT
  const modalOverlay = document.getElementById("modalOverlay");
  document.getElementById("addClientBtn").addEventListener("click", () => openModal());
  document.getElementById("cancelModalBtn").addEventListener("click", () => closeModal());

  function openModal(client){
    editingClientId = client ? client.id : null;
    document.getElementById("modalTitle").textContent = client ? "Edit client" : "Add client";
    document.getElementById("fName").value = client?.name || "";
    document.getElementById("fPhone").value = client?.phone || "";
    document.getElementById("fEmail").value = client?.email || "";
    document.getElementById("fBusiness").value = client?.business || "";
    document.getElementById("fTags").value = (client?.tags || []).join(", ");
    document.getElementById("fNotes").value = client?.notes || "";
    modalOverlay.classList.add("open");
  }
  function closeModal(){ modalOverlay.classList.remove("open"); }

  document.getElementById("saveClientBtn").addEventListener("click", async () => {
    const name = document.getElementById("fName").value.trim();
    if(!name){ alert("Client name is required."); return; }

    const data = {
      name,
      phone: document.getElementById("fPhone").value.trim(),
      email: document.getElementById("fEmail").value.trim(),
      business: document.getElementById("fBusiness").value.trim(),
      tags: document.getElementById("fTags").value.split(",").map(t => t.trim()).filter(Boolean),
      notes: document.getElementById("fNotes").value.trim()
    };

    try{
      if(editingClientId){
        await updateDoc(doc(db, "clients", editingClientId), data);
        await logActivity(`Updated client: ${name}`);
      } else {
        await addDoc(collection(db, "clients"), { ...data, createdAt: serverTimestamp() });
        await logActivity(`New client added: ${name}`);
      }
      closeModal();
      await loadClients();
      if(editingClientId) await openClientDetail(editingClientId);
    } catch(err){
      alert("Could not save client. Check your connection and try again.");
      console.error(err);
    }
  });

  // DETAIL VIEW
  const listView = document.getElementById("listView");
  const detailView = document.getElementById("detailView");

  async function openClientDetail(id){
    activeClientId = id;
    const client = allClients.find(c => c.id === id);
    if(!client) return;

    document.getElementById("detailName").textContent = client.name || "Unnamed client";
    document.getElementById("detailBusiness").textContent = client.business || "No business listed";
    document.getElementById("detailPhone").textContent = "Phone: " + (client.phone || "-");
    document.getElementById("detailEmail").textContent = "Email: " + (client.email || "-");
    document.getElementById("detailNotes").textContent = client.notes || "No notes yet.";
    document.getElementById("detailTags").innerHTML = (client.tags || []).map(t => `<span class="tag">${t}</span>`).join("") || "<span style='color:var(--text-muted);font-size:12px;'>No tags</span>";

    listView.classList.add("hidden");
    detailView.classList.add("open");

    switchTab("overview");
    loadHistory(id);
    loadClientPayments(client);
    loadClientProjects(client);
  }

  document.getElementById("backBtn").addEventListener("click", () => {
    detailView.classList.remove("open");
    listView.classList.remove("hidden");
    activeClientId = null;
  });

  document.getElementById("editClientBtn").addEventListener("click", () => {
    const client = allClients.find(c => c.id === activeClientId);
    if(client) openModal(client);
  });

  document.getElementById("deleteClientBtn").addEventListener("click", async () => {
    const client = allClients.find(c => c.id === activeClientId);
    if(!client) return;
    if(!confirm(`Delete ${client.name}? This cannot be undone.`)) return;
    try{
      await deleteDoc(doc(db, "clients", activeClientId));
      await logActivity(`Deleted client: ${client.name}`);
      detailView.classList.remove("open");
      listView.classList.remove("hidden");
      await loadClients();
    } catch(err){
      alert("Could not delete client.");
      console.error(err);
    }
  });

  // TABS
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => switchTab(btn.dataset.tab));
  });
  function switchTab(tab){
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id === "tab-" + tab));
  }

  // HISTORY
  async function loadHistory(clientId){
    const el = document.getElementById("historyList");
    el.innerHTML = `<div class="loading-row"><div class="spin"></div>Loading history</div>`;
    try{
      const snap = await getDocs(collection(db, "clients", clientId, "history"));
      const items = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
      if(items.length === 0){
        el.innerHTML = `<div class="empty-state" style="padding:24px 8px;"><p>No interactions logged yet.</p></div>`;
        return;
      }
      el.innerHTML = items.map(h => {
        const date = h.timestamp?.seconds ? new Date(h.timestamp.seconds * 1000).toLocaleDateString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : "Just now";
        return `<div class="history-item">
          <div class="history-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg></div>
          <div class="history-body">
            <div class="history-note">${h.note || ""}</div>
            <div class="history-meta">${(h.type || "note")} &middot; ${date}</div>
          </div>
        </div>`;
      }).join("");
    } catch(err){
      el.innerHTML = `<div class="empty-state" style="padding:24px 8px;"><p>Could not load history.</p></div>`;
    }
  }

  document.getElementById("addHistoryBtn").addEventListener("click", async () => {
    const note = document.getElementById("historyNote").value.trim();
    const type = document.getElementById("historyType").value;
    if(!note || !activeClientId) return;
    try{
      await addDoc(collection(db, "clients", activeClientId, "history"), {
        type, note, timestamp: serverTimestamp()
      });
      document.getElementById("historyNote").value = "";
      await loadHistory(activeClientId);
      const client = allClients.find(c => c.id === activeClientId);
      await logActivity(`${type} logged for ${client?.name || "a client"}`);
    } catch(err){
      alert("Could not log this interaction.");
    }
  });

  // PAYMENTS + PROJECTS TIED TO THIS CLIENT
  async function loadClientPayments(client){
    const el = document.getElementById("clientPaymentsList");
    try{
      const snap = await getDocs(query(collection(db, "payments"), where("clientId", "==", client.id)));
      const items = snap.docs.map(d => d.data());
      if(items.length === 0){
        el.innerHTML = `<div class="empty-state" style="padding:24px 8px;"><p>No payments recorded for this client. <a href="payments.html" style="color:var(--cyan);">Add one</a></p></div>`;
        return;
      }
      el.innerHTML = items.map(p => `
        <div class="list-item" style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;">
          <span>${p.description || "Payment"}</span>
          <span>${fmtKES(p.amountReceived)} / ${fmtKES(p.amountExpected)}</span>
        </div>`).join("");
    } catch(err){
      el.innerHTML = `<div class="empty-state" style="padding:24px 8px;"><p>No payments recorded yet.</p></div>`;
    }
  }

  async function loadClientProjects(client){
    const el = document.getElementById("clientProjectsList");
    try{
      const snap = await getDocs(query(collection(db, "projects"), where("clientId", "==", client.id)));
      const items = snap.docs.map(d => d.data());
      if(items.length === 0){
        el.innerHTML = `<div class="empty-state" style="padding:24px 8px;"><p>No projects linked yet. <a href="projects.html" style="color:var(--cyan);">Add one</a></p></div>`;
        return;
      }
      el.innerHTML = items.map(p => `
        <div class="list-item" style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;">
          <span>${p.title || "Project"}</span>
          <span style="color:var(--text-muted);">${p.status || "-"}</span>
        </div>`).join("");
    } catch(err){
      el.innerHTML = `<div class="empty-state" style="padding:24px 8px;"><p>No projects linked yet.</p></div>`;
    }
  }
</script>

</body>
</html>
