<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MtaaniOS | Projects</title>
<link rel="icon" type="image/png" href="https://res.cloudinary.com/hztm3zo8/image/upload/v1783966839/Purple_and_Blue_Grdient_Simple_Minimalist_Elegant_Website_Logo_20260713_211434_0000_ndnwtt.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0D0B2B;--navy-soft:#141230;--navy-card:#181633;
    --cyan:#38B6FF;--purple:#9B59B6;--text-primary:#F4F5F9;--text-muted:#9A9AB5;
    --border:rgba(255,255,255,0.08);--danger:#FF6B6B;--success:#4ADE80;--warn:#FFC107;
    --sidebar-w:240px;
  }
  [data-theme="light"]{
    --navy:#F4F5F9;--navy-soft:#FFFFFF;--navy-card:#FFFFFF;
    --text-primary:#171630;--text-muted:#6B6B85;--border:rgba(13,11,43,0.1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--navy);font-family:'Inter',sans-serif;color:var(--text-primary);min-height:100vh;display:flex;transition:background 0.3s, color 0.3s;}
  .sidebar{width:var(--sidebar-w);background:var(--navy-soft);border-right:1px solid var(--border);height:100vh;position:fixed;top:0;left:0;display:flex;flex-direction:column;padding:24px 16px;z-index:100;transition:transform 0.3s;}
  .brand{display:flex;align-items:center;gap:10px;padding:0 8px 24px;margin-bottom:8px;border-bottom:1px solid var(--border);}
  .brand img{width:32px;height:32px;border-radius:8px;}
  .brand span{font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;}
  nav{flex:1;display:flex;flex-direction:column;gap:2px;margin-top:16px;overflow-y:auto;}
  nav a{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:500;transition:background 0.15s, color 0.15s;}
  nav a svg{width:16px;height:16px;flex-shrink:0;}
  nav a:hover{background:rgba(56,182,255,0.08);color:var(--text-primary);}
  nav a.active{background:linear-gradient(135deg, rgba(56,182,255,0.15), rgba(155,89,182,0.15));color:var(--cyan);}
  .sidebar-footer{border-top:1px solid var(--border);padding-top:16px;margin-top:8px;position:relative;}
  .signout-btn{width:100%;padding:10px 12px;background:none;border:1px solid var(--border);border-radius:10px;color:var(--danger);font-size:13px;font-weight:500;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;}
  .signout-btn:hover{background:rgba(255,107,107,0.08);}

  .main{margin-left:var(--sidebar-w);flex:1;padding:32px 40px 60px;max-width:1100px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:16px;}
  .topbar h1{font-family:'Poppins',sans-serif;font-weight:600;font-size:24px;}
  .topbar p{color:var(--text-muted);font-size:13px;margin-top:2px;}

  .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:10px;border:none;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer;}
  .btn-primary{background:linear-gradient(135deg, var(--cyan), var(--purple));color:#fff;}
  .btn-primary:hover{opacity:0.92;}
  .btn-ghost{background:none;border:1px solid var(--border);color:var(--text-primary);}
  .btn-ghost:hover{background:rgba(255,255,255,0.04);}
  .btn-danger{background:rgba(255,107,107,0.1);color:var(--danger);border:1px solid rgba(255,107,107,0.2);}
  .btn-sm{padding:6px 11px;font-size:11px;}

  .status-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:20px;padding-bottom:4px;}
  .status-tab{flex-shrink:0;padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--navy-card);color:var(--text-muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;}
  .status-tab.active{background:linear-gradient(135deg, rgba(56,182,255,0.18), rgba(155,89,182,0.18));color:var(--cyan);border-color:transparent;}

  .search-row{display:flex;gap:10px;margin-bottom:20px;}
  .search-row input{flex:1;padding:11px 14px;background:var(--navy-card);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-size:13px;}
  .search-row input:focus{outline:none;border-color:var(--cyan);}

  .project-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .project-card{background:var(--navy-card);border:1px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;transition:transform 0.15s, box-shadow 0.15s;position:relative;overflow:hidden;}
  .project-card:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(56,182,255,0.1);}
  .project-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px;}
  .project-title{font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;}
  .project-client{font-size:12px;color:var(--text-muted);margin-bottom:12px;}
  .progress-bar{height:6px;background:rgba(255,255,255,0.06);border-radius:10px;overflow:hidden;margin-bottom:10px;}
  .progress-fill{height:100%;background:linear-gradient(90deg, var(--cyan), var(--purple));border-radius:10px;}
  .project-meta{font-size:11px;color:var(--text-muted);display:flex;flex-direction:column;gap:4px;}
  .status-badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:0.02em;white-space:nowrap;}
  .status-badge.not-started{background:rgba(154,154,181,0.15);color:var(--text-muted);}
  .status-badge.in-progress{background:rgba(56,182,255,0.15);color:var(--cyan);}
  .status-badge.review{background:rgba(255,193,7,0.15);color:var(--warn);}
  .status-badge.completed{background:rgba(74,222,128,0.15);color:var(--success);}
  .status-badge.on-hold{background:rgba(255,107,107,0.15);color:var(--danger);}
  .deadline-tag{font-size:11px;font-weight:600;}
  .deadline-tag.overdue{color:var(--danger);}
  .deadline-tag.soon{color:var(--warn);}

  .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
  .empty-state svg{width:40px;height:40px;margin-bottom:14px;opacity:0.4;}
  .empty-state p{font-size:13px;}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--navy-soft);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;}
  .modal h2{font-family:'Poppins',sans-serif;font-size:17px;font-weight:600;margin-bottom:18px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:500;color:var(--text-muted);margin-bottom:6px;}
  .field input, .field textarea, .field select{width:100%;padding:11px 13px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:9px;color:var(--text-primary);font-size:13px;font-family:'Inter',sans-serif;resize:vertical;}
  .field input:focus, .field textarea:focus, .field select:focus{outline:none;border-color:var(--cyan);}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}
  .modal-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
  .modal-actions .btn{flex:1;justify-content:center;min-width:100px;}

  /* DETAIL */
  .detail-view{display:none;}
  .detail-view.open{display:block;}
  .list-view.hidden{display:none;}
  .back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--text-muted);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:20px;}
  .back-btn:hover{color:var(--text-primary);}
  .detail-header{display:flex;justify-content:space-between;align-items:flex-start;background:var(--navy-card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;flex-wrap:wrap;gap:16px;}
  .detail-name{font-family:'Poppins',sans-serif;font-size:20px;font-weight:600;margin-bottom:4px;}
  .detail-client{color:var(--text-muted);font-size:13px;margin-bottom:12px;}
  .detail-dates{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text-muted);}
  .detail-actions{display:flex;gap:8px;}

  .tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);}
  .tab-btn{background:none;border:none;padding:10px 16px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;font-family:'Inter',sans-serif;}
  .tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}
  .panel{background:var(--navy-card);border:1px solid var(--border);border-radius:16px;padding:22px;}
  .desc-text{font-size:13px;line-height:1.6;color:var(--text-primary);white-space:pre-wrap;}

  .checklist-form{display:flex;gap:8px;margin-bottom:16px;}
  .checklist-form input{flex:1;padding:10px 12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:13px;font-family:'Inter',sans-serif;}
  .checklist-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
  .checklist-item:last-child{border-bottom:none;}
  .checklist-item input[type="checkbox"]{width:18px;height:18px;accent-color:var(--cyan);cursor:pointer;flex-shrink:0;}
  .checklist-text{flex:1;font-size:13px;}
  .checklist-text.done{text-decoration:line-through;color:var(--text-muted);}
  .checklist-remove{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;}
  .checklist-remove:hover{color:var(--danger);}

  .loading-row{display:flex;align-items:center;gap:8px;color:var(--text-muted);font-size:12px;padding:16px 0;}
  .spin{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .mobile-toggle{display:none;position:fixed;top:16px;left:16px;z-index:200;background:var(--navy-card);border:1px solid var(--border);border-radius:10px;width:40px;height:40px;align-items:center;justify-content:center;cursor:pointer;}
  @media(max-width:860px){
    .sidebar{transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .main{margin-left:0;padding:32px 20px 60px;}
    .mobile-toggle{display:flex;}
    .topbar{margin-top:36px;}
  }

  /* DESKTOP: cards expand beyond the fixed 2-column mobile layout */
  @media(min-width:900px){
  .project-grid{grid-template-columns:repeat(auto-fill, minmax(270px, 1fr));}
  }

  .alert-bell{
    width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;
    background:none;border:1px solid var(--border);border-radius:10px;
    color:var(--text-muted);font-size:13px;font-weight:500;cursor:pointer;
    font-family:'Inter',sans-serif;margin-bottom:8px;position:relative;
  }
  .alert-bell:hover{background:rgba(56,182,255,0.08);color:var(--text-primary);}
  .alert-bell svg{width:16px;height:16px;flex-shrink:0;}
  .alert-badge{
    margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;
    padding:2px 7px;border-radius:20px;line-height:1.4;
  }
  .alert-panel{
    position:absolute;bottom:100%;left:16px;right:16px;margin-bottom:8px;
    background:var(--navy-soft);border:1px solid var(--border);border-radius:12px;
    padding:14px;max-height:280px;overflow-y:auto;box-shadow:0 12px 30px rgba(0,0,0,0.4);
    z-index:250;
  }
  .alert-panel-title{font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;margin-bottom:10px;color:var(--text-primary);}
  .alert-item{display:flex;flex-direction:column;gap:1px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;}
  .alert-item:last-child{border-bottom:none;}
  .alert-item-title{color:var(--text-primary);font-weight:500;}
  .alert-item-sub{color:var(--text-muted);font-size:11px;}
  .alert-empty{color:var(--text-muted);font-size:12px;padding:6px 0;}
  nav a[href="payments.html"], nav a[href="reports.html"]{display:none;}

  @media(max-width:400px){
    .project-card{padding:14px;}
    .project-title{font-size:14px;word-break:break-word;}
  }
</style>
</head>

<main class="main">

  <div class="list-view" id="listView">
    <div class="topbar">
      <div>
        <h1>Projects</h1>
        <p id="projectCount">Loading projects</p>
      </div>
      <button class="btn btn-primary" id="addProjectBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add project
      </button>
    </div>

    <div class="status-tabs" id="statusTabs">
      <button class="status-tab active" data-status="all">All</button>
      <button class="status-tab" data-status="Not Started">Not Started</button>
      <button class="status-tab" data-status="In Progress">In Progress</button>
      <button class="status-tab" data-status="Review">Review</button>
      <button class="status-tab" data-status="Completed">Completed</button>
      <button class="status-tab" data-status="On Hold">On Hold</button>
    </div>

    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Search by project title or client">
    </div>

    <div id="projectGridWrap">
      <div class="loading-row"><div class="spin"></div>Loading projects</div>
    </div>
  </div>

  <div class="detail-view" id="detailView">
    <button class="back-btn" id="backBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to projects
    </button>

    <div class="detail-header">
      <div>
        <div class="detail-name" id="detailTitle">Project title</div>
        <div class="detail-client" id="detailClient">Client</div>
        <div class="detail-dates">
          <span id="detailStart">Start: -</span>
          <span id="detailDeadline">Deadline: -</span>
        </div>
      </div>
      <div class="detail-actions">
        <button class="btn btn-ghost" id="editProjectBtn">Edit</button>
        <button class="btn btn-danger" id="deleteProjectBtn">Delete</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="overview">Overview</button>
      <button class="tab-btn" data-tab="tasks">Tasks</button>
      <button class="tab-btn" data-tab="milestones">Milestones</button>
    </div>

    <div class="tab-panel active" id="tab-overview">
      <div class="panel">
        <div class="field"><label>Status</label><span class="status-badge" id="detailStatusBadge"></span></div>
        <div class="field" style="margin-top:14px;"><label>Description</label><div class="desc-text" id="detailDesc">No description added.</div></div>
      </div>
    </div>

    <div class="tab-panel" id="tab-tasks">
      <div class="panel">
        <div class="checklist-form">
          <input type="text" id="newTaskInput" placeholder="Add a project task">
          <button class="btn btn-primary btn-sm" id="addTaskBtn">Add</button>
        </div>
        <div id="taskChecklist"><div class="loading-row"><div class="spin"></div>Loading tasks</div></div>
      </div>
    </div>

    <div class="tab-panel" id="tab-milestones">
      <div class="panel">
        <div class="checklist-form">
          <input type="text" id="newMilestoneInput" placeholder="Add a milestone">
          <button class="btn btn-primary btn-sm" id="addMilestoneBtn">Add</button>
        </div>
        <div id="milestoneChecklist"><div class="loading-row"><div class="spin"></div>Loading milestones</div></div>
      </div>
    </div>
  </div>

</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add project</h2>
    <div class="field"><label>Project title</label><input type="text" id="fTitle" placeholder="e.g. Website Development"></div>
    <div class="field"><label>Client</label>
      <select id="fClient"><option value="">No client linked</option></select>
    </div>
    <div class="field-row">
      <div class="field"><label>Start date</label><input type="date" id="fStart"></div>
      <div class="field"><label>Deadline</label><input type="date" id="fDeadline"></div>
    </div>
    <div class="field"><label>Status</label>
      <select id="fStatus">
        <option>Not Started</option>
        <option>In Progress</option>
        <option>Review</option>
        <option>Completed</option>
        <option>On Hold</option>
      </select>
    </div>
    <div class="field"><label>Description</label><textarea id="fDesc" rows="3" placeholder="Scope, requirements, anything worth remembering"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelModalBtn">Cancel</button>
      <button class="btn btn-primary" id="saveProjectBtn">Save project</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import {
    getFirestore, collection, getDocs, doc, addDoc, updateDoc, deleteDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-ndNW__8PMGJB3QHnFD9J7XtQh82EqjA",
    authDomain: "mtaanios.firebaseapp.com",
    projectId: "mtaanios",
    storageBucket: "mtaanios.firebasestorage.app",
    messagingSenderId: "407302134340",
    appId: "1:407302134340:web:697218f5731b0314a23a11"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const ADMIN_EMAIL = "mtaaniweb@gmail.com";

  let currentUser = null;
  let allProjects = [];
  let allClients = [];
  let activeStatus = "all";
  let editingProjectId = null;
  let activeProjectId = null;


  async function applySidebarRestrictions(user){
    const isAdmin = user.email.toLowerCase() === ADMIN_EMAIL;
    if(isAdmin){
      document.querySelectorAll('nav a[href="payments.html"], nav a[href="reports.html"]').forEach(a => a.style.display = "flex");
      return;
    }
    const teamLink = document.querySelector('nav a[href="team.html"]');
    if(teamLink) teamLink.setAttribute("href", "teamdash.html");

    // Team members with a Collections role need Payments access to log what
    // they have personally collected. Reports stays admin-only regardless.
    try{
      const snap = await getDocs(collection(db, "team"));
      const team = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      const profile = team.find(m => (m.email || "").toLowerCase() === user.email.toLowerCase());
      if(profile && (profile.roles || []).includes("Collections")){
        const paymentsLink = document.querySelector('nav a[href="payments.html"]');
        if(paymentsLink) paymentsLink.style.display = "flex";
      }
    } catch(err){ console.warn("Could not check team role", err.message); }
  }

  onAuthStateChanged(auth, (user) => {
    if(!user){ window.location.href = "login.html"; return; }
    currentUser = user;
    applySidebarRestrictions(user);
    initAlertBell(user, user.email.toLowerCase() === ADMIN_EMAIL);
    loadClientsForDropdown();
    loadProjects();
  });

  document.getElementById("signoutBtn").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "login.html";
  });

  const sidebar = document.getElementById("sidebar");
  document.getElementById("mobileToggle").addEventListener("click", () => sidebar.classList.toggle("open"));

  const savedTheme = localStorage.getItem("mtaanios-theme") || "dark";
  document.body.setAttribute("data-theme", savedTheme);

  async function logActivity(description){
    try{
      await addDoc(collection(db, "activity"), {
        description, actor: currentUser ? currentUser.email : "System", timestamp: serverTimestamp()
      });
    } catch(err){ console.warn("Could not log activity", err.message); }
  }

  function statusClass(status){
    return (status || "Not Started").toLowerCase().replace(/\s+/g, "-");
  }
  function fmtDate(d){
    if(!d) return "-";
    return new Date(d + "T00:00:00").toLocaleDateString([], {month:'short', day:'numeric'});
  }

  async function loadClientsForDropdown(){
    try{
      const snap = await getDocs(collection(db, "clients"));
      allClients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      const select = document.getElementById("fClient");
      allClients.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = c.name + (c.business ? ` (${c.business})` : "");
        select.appendChild(opt);
      });
    } catch(err){ console.warn("Could not load clients for dropdown", err.message); }
  }

  async function loadProjects(){
    try{
      const snap = await getDocs(collection(db, "projects"));
      allProjects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      applyFilters();
    } catch(err){
      console.warn("Could not load projects", err.message);
      allProjects = [];
      applyFilters();
    }
  }

  document.querySelectorAll(".status-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".status-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      activeStatus = tab.dataset.status;
      applyFilters();
    });
  });
  document.getElementById("searchInput").addEventListener("input", applyFilters);

  function applyFilters(){
    const term = document.getElementById("searchInput").value.toLowerCase();
    let filtered = allProjects;
    if(activeStatus !== "all") filtered = filtered.filter(p => p.status === activeStatus);
    if(term) filtered = filtered.filter(p => (p.title || "").toLowerCase().includes(term) || (p.clientName || "").toLowerCase().includes(term));
    renderProjects(filtered);
  }

  function renderProjects(list){
    const wrap = document.getElementById("projectGridWrap");
    document.getElementById("projectCount").textContent = allProjects.length === 0 ? "No projects yet" : allProjects.length + (allProjects.length === 1 ? " project total" : " projects total");

    if(list.length === 0){
      wrap.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        <p>No projects here yet.</p>
      </div>`;
      return;
    }

    const todayStr = new Date().toISOString().split("T")[0];
    wrap.innerHTML = `<div class="project-grid">` + list.map(p => {
      let deadlineHtml = "";
      if(p.deadline){
        const overdue = p.deadline < todayStr && p.status !== "Completed";
        const soon = !overdue && p.deadline <= new Date(Date.now() + 3*86400000).toISOString().split("T")[0];
        deadlineHtml = `<span class="deadline-tag ${overdue ? "overdue" : soon ? "soon" : ""}">${overdue ? "Overdue" : "Due"} ${fmtDate(p.deadline)}</span>`;
      }
      return `<div class="project-card" data-id="${p.id}">
        <div class="project-top">
          <div class="project-title">${p.title || "Untitled project"}</div>
          <span class="status-badge ${statusClass(p.status)}">${p.status || "Not Started"}</span>
        </div>
        <div class="project-client">${p.clientName || "No client linked"}</div>
        <div class="project-meta">
          ${deadlineHtml}
        </div>
      </div>`;
    }).join("") + `</div>`;

    document.querySelectorAll(".project-card").forEach(card => {
      card.addEventListener("click", () => openProjectDetail(card.dataset.id));
    });
  }

  const modalOverlay = document.getElementById("modalOverlay");
  document.getElementById("addProjectBtn").addEventListener("click", () => openModal());
  document.getElementById("cancelModalBtn").addEventListener("click", () => modalOverlay.classList.remove("open"));

  function openModal(project){
    editingProjectId = project ? project.id : null;
    document.getElementById("modalTitle").textContent = project ? "Edit project" : "Add project";
    document.getElementById("fTitle").value = project?.title || "";
    document.getElementById("fClient").value = project?.clientId || "";
    document.getElementById("fStart").value = project?.startDate || "";
    document.getElementById("fDeadline").value = project?.deadline || "";
    document.getElementById("fStatus").value = project?.status || "Not Started";
    document.getElementById("fDesc").value = project?.description || "";
    modalOverlay.classList.add("open");
  }

  document.getElementById("saveProjectBtn").addEventListener("click", async () => {
    const title = document.getElementById("fTitle").value.trim();
    if(!title){ alert("Project title is required."); return; }

    const clientId = document.getElementById("fClient").value;
    const client = allClients.find(c => c.id === clientId);

    const data = {
      title,
      clientId: clientId || "",
      clientName: client ? client.name : "",
      startDate: document.getElementById("fStart").value,
      deadline: document.getElementById("fDeadline").value,
      status: document.getElementById("fStatus").value,
      description: document.getElementById("fDesc").value.trim()
    };

    try{
      if(editingProjectId){
        await updateDoc(doc(db, "projects", editingProjectId), data);
        await logActivity(`Project updated: ${title}`);
      } else {
        await addDoc(collection(db, "projects"), { ...data, createdAt: serverTimestamp() });
        await logActivity(`New project started: ${title}`);
      }
      modalOverlay.classList.remove("open");
      await loadProjects();
      if(editingProjectId && activeProjectId === editingProjectId) await openProjectDetail(editingProjectId);
    } catch(err){
      alert("Could not save project. Check your connection and try again.");
      console.error(err);
    }
  });

  // DETAIL VIEW
  const listView = document.getElementById("listView");
  const detailView = document.getElementById("detailView");

  async function openProjectDetail(id){
    activeProjectId = id;
    const p = allProjects.find(x => x.id === id);
    if(!p) return;

    document.getElementById("detailTitle").textContent = p.title || "Untitled project";
    document.getElementById("detailClient").textContent = p.clientName || "No client linked";
    document.getElementById("detailStart").textContent = "Start: " + fmtDate(p.startDate);
    document.getElementById("detailDeadline").textContent = "Deadline: " + fmtDate(p.deadline);
    document.getElementById("detailDesc").textContent = p.description || "No description added.";
    const badge = document.getElementById("detailStatusBadge");
    badge.textContent = p.status || "Not Started";
    badge.className = "status-badge " + statusClass(p.status);

    listView.classList.add("hidden");
    detailView.classList.add("open");
    switchTab("overview");
    loadChecklist(id, "tasks", "taskChecklist");
    loadChecklist(id, "milestones", "milestoneChecklist");
  }

  document.getElementById("backBtn").addEventListener("click", () => {
    detailView.classList.remove("open");
    listView.classList.remove("hidden");
    activeProjectId = null;
  });

  document.getElementById("editProjectBtn").addEventListener("click", () => {
    const p = allProjects.find(x => x.id === activeProjectId);
    if(p) openModal(p);
  });

  document.getElementById("deleteProjectBtn").addEventListener("click", async () => {
    const p = allProjects.find(x => x.id === activeProjectId);
    if(!p) return;
    if(!confirm(`Delete project "${p.title}"? This cannot be undone.`)) return;
    try{
      await deleteDoc(doc(db, "projects", activeProjectId));
      await logActivity(`Deleted project: ${p.title}`);
      detailView.classList.remove("open");
      listView.classList.remove("hidden");
      await loadProjects();
    } catch(err){
      alert("Could not delete project.");
    }
  });

  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => switchTab(btn.dataset.tab));
  });
  function switchTab(tab){
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id === "tab-" + tab));
  }

  // CHECKLISTS (tasks + milestones, same subcollection pattern)
  async function loadChecklist(projectId, subcol, elId){
    const el = document.getElementById(elId);
    el.innerHTML = `<div class="loading-row"><div class="spin"></div>Loading</div>`;
    try{
      const snap = await getDocs(collection(db, "projects", projectId, subcol));
      const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderChecklist(items, subcol, elId);
    } catch(err){
      el.innerHTML = `<div class="empty-state" style="padding:24px 8px;"><p>Nothing added yet.</p></div>`;
    }
  }

  function renderChecklist(items, subcol, elId){
    const el = document.getElementById(elId);
    if(items.length === 0){
      el.innerHTML = `<div class="empty-state" style="padding:24px 8px;"><p>Nothing added yet.</p></div>`;
      return;
    }
    el.innerHTML = items.map(item => `
      <div class="checklist-item">
        <input type="checkbox" data-toggle="${item.id}" data-subcol="${subcol}" ${item.done ? "checked" : ""}>
        <span class="checklist-text ${item.done ? "done" : ""}">${item.text}</span>
        <button class="checklist-remove" data-remove="${item.id}" data-subcol="${subcol}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    `).join("");

    el.querySelectorAll("[data-toggle]").forEach(cb => {
      cb.addEventListener("change", async () => {
        await updateDoc(doc(db, "projects", activeProjectId, cb.dataset.subcol, cb.dataset.toggle), { done: cb.checked });
        loadChecklist(activeProjectId, cb.dataset.subcol, cb.dataset.subcol === "tasks" ? "taskChecklist" : "milestoneChecklist");
      });
    });
    el.querySelectorAll("[data-remove]").forEach(btn => {
      btn.addEventListener("click", async () => {
        await deleteDoc(doc(db, "projects", activeProjectId, btn.dataset.subcol, btn.dataset.remove));
        loadChecklist(activeProjectId, btn.dataset.subcol, btn.dataset.subcol === "tasks" ? "taskChecklist" : "milestoneChecklist");
      });
    });
  }

  document.getElementById("addTaskBtn").addEventListener("click", () => addChecklistItem("tasks", "newTaskInput", "taskChecklist"));
  document.getElementById("addMilestoneBtn").addEventListener("click", () => addChecklistItem("milestones", "newMilestoneInput", "milestoneChecklist"));

  async function addChecklistItem(subcol, inputId, elId){
    const input = document.getElementById(inputId);
    const text = input.value.trim();
    if(!text || !activeProjectId) return;
    try{
      await addDoc(collection(db, "projects", activeProjectId, subcol), { text, done: false, createdAt: serverTimestamp() });
      input.value = "";
      loadChecklist(activeProjectId, subcol, elId);
    } catch(err){
      alert("Could not add item.");
    }
  }

  // ===== ALERT BELL =====
  async function initAlertBell(user, isAdminUser){
    let myName = null;
    if(!isAdminUser){
      try{
        const teamSnap = await getDocs(collection(db, "team"));
        const teamList = teamSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        const profile = teamList.find(m => (m.email || "").toLowerCase() === user.email.toLowerCase());
        myName = profile ? profile.name : null;
      } catch(err){ myName = null; }
    }

    const todayStr = new Date().toISOString().split("T")[0];
    const items = [];

    try{
      const taskSnap = await getDocs(collection(db, "tasks"));
      const tasks = taskSnap.docs.map(d => d.data());
      const overdue = tasks.filter(t => t.dueDate && t.dueDate < todayStr && t.status !== "Done" && (isAdminUser || t.assignedTo === myName));
      overdue.forEach(t => items.push({ type: "task", title: `Overdue: ${t.title || "Task"}`, sub: t.dueDate }));
    } catch(err){}

    try{
      const leadSnap = await getDocs(collection(db, "leads"));
      const leads = leadSnap.docs.map(d => d.data());
      const due = leads.filter(l => l.followUpDate && l.followUpDate <= todayStr && l.stage !== "Won" && l.stage !== "Lost" && (isAdminUser || l.assignedTo === myName));
      due.forEach(l => items.push({ type: "lead", title: `Follow up: ${l.name || "Lead"}`, sub: l.business || "" }));
    } catch(err){}

    if(isAdminUser){
      try{
        const paySnap = await getDocs(collection(db, "payments"));
        const payments = paySnap.docs.map(d => d.data());
        const outstanding = payments.filter(p => Number(p.amountExpected || 0) > Number(p.amountReceived || 0));
        outstanding.forEach(p => items.push({ type: "payment", title: `Outstanding: ${p.clientName || "Client"}`, sub: "KES " + (Number(p.amountExpected||0) - Number(p.amountReceived||0)).toLocaleString("en-KE") }));
      } catch(err){}
    }

    const badge = document.getElementById("alertBadge");
    const listEl = document.getElementById("alertPanelList");
    if(items.length === 0){
      badge.style.display = "none";
      listEl.innerHTML = '<div class="alert-empty">All clear.</div>';
    } else {
      badge.style.display = "inline-block";
      badge.textContent = items.length;
      listEl.innerHTML = items.map(i => `<div class="alert-item"><span class="alert-item-title">${i.title}</span><span class="alert-item-sub">${i.sub}</span></div>`).join("");
    }
  }

  const alertBellBtn = document.getElementById("alertBellBtn");
  const alertPanel = document.getElementById("alertPanel");
  if(alertBellBtn){
    alertBellBtn.addEventListener("click", () => {
      alertPanel.style.display = alertPanel.style.display === "none" ? "block" : "none";
    });
    document.addEventListener("click", (e) => {
      if(!alertBellBtn.contains(e.target) && !alertPanel.contains(e.target)){
        alertPanel.style.display = "none";
      }
    });
  }

</script>

</body>
</html>
